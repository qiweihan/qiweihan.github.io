name                     : &name "Qiwei Han"
description              : &description "Assistant Professor of Business Analytics at Nova School of Business and Economics"
url                      : https://qiweihan.github.io
baseurl                  : ""
repository               : "qiweihan/qiweihan.github.io"

# Site Author
author:
  avatar           : "profile.png"
  name             : "Qiwei Han"
  pronouns         :
  bio              : "Assistant Professor of Business Analytics (tenure-track) at Nova School of Business and Economics. Research in econometrics, machine learning, and computational social science."
  location         : "Carcavelos, Portugal"
  employer         : "Nova School of Business and Economics"
  uri              : "https://qiweihan.github.io"
  email            : "qiwei.han@novasbe.pt"

  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=koBWI88AAAAJ&hl=en"
  inspire-hep      :
  impactstory      :
  orcid            : "https://orcid.org/0000-0002-6044-4530"
  semantic         :
